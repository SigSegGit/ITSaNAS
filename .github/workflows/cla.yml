name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant Lite
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla/signatures.json"
          path-to-document: "https://github.com/SigSegGit/ITSaNAS/blob/main/CLA.md"
          branch: "cla-signatures"
          # Owner decision: this project's commits are made by the owner's
          # own Claude Code sessions under this fixed automation identity.
          # Exempted explicitly, the same as the human owner, rather than
          # requiring per-session CLA sign-off for the owner's own tooling.
          allowlist: SigSegGit,noreply@anthropic.com
