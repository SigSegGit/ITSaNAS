name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant Lite
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla/signatures.json"
          path-to-document: "https://github.com/SigSegGit/ITSaNAS/blob/main/CLA.md"
          branch: "cla-signatures"
          # Owner decision: this project's commits are made by the owner's
          # own Claude Code sessions under a fixed automation identity
          # (Claude <noreply@anthropic.com>), meant to be exempted from
          # CLA sign-off the same way the owner's own SigSegGit account is
          # exempted below.
          #
          # That doesn't actually work, confirmed on PR #7:
          # contributor-assistant/github-action's `allowlist` matches only
          # GitHub usernames/logins (per its own docs), never raw git
          # commit-author emails — an email with no GitHub account behind
          # it can never match, whatever's listed here. `noreply
          # @anthropic.com` is left out rather than kept as a no-op entry
          # that looks like it does something.
          #
          # Net effect: `cla-check` shows red on every PR from this
          # automation identity. Harmless — it isn't a required status
          # check, only `CI / ci` is — but a real fix (e.g. authoring
          # commits under a real GitHub-linked identity) is an owner
          # decision, not something to route around unilaterally.
          allowlist: SigSegGit
