name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run CI script
        run: ./scripts/ci.sh

      # Windows filesystem semantics differ from Linux in ways the
      # native test run can't see (first real Windows install: every
      # shard write failed with os error 5 because FlushFileBuffers
      # refuses read-only handles). Run the fs-heavy crates' tests as
      # real Windows binaries under Wine so that class of regression
      # fails CI instead of shipping.
      - name: Install mingw-w64 and wine
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wine

      - name: Run Windows tests under Wine
        run: ./scripts/test-windows.sh

      # Same idea one level up: the whole smoke-e2e suite (real daemons,
      # HTTP + on-disk assertions) against the release Windows daemon
      # binary under Wine — the daemon is a different program on Windows
      # (filesystem semantics, socket stack, known-folder/cert-store
      # APIs) and this is the layer that exercises it end-to-end.
      - name: Run Windows e2e smoke test under Wine
        run: ./scripts/smoke-e2e-windows.sh
